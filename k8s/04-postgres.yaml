# ---------------------------------------------------------------------------
# Headless Service for Postgres.
# clusterIP: None makes this "headless" — DNS returns the pod IP directly.
# This is the standard companion to a StatefulSet and gives the DB a stable
# network name: "db". The app connects to host "db" on port 5432.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: learningdemo
spec:
  clusterIP: None
  selector:
    app: db
  ports:
    - port: 5432
      targetPort: 5432
---
# ---------------------------------------------------------------------------
# StatefulSet for Postgres.
# WHY StatefulSet (not Deployment) for a database:
#   - stable, sticky identity (db-0) and stable storage that is reattached
#     to the same pod across restarts/rescheduling.
#   - volumeClaimTemplates creates a dedicated PersistentVolumeClaim per pod,
#     so the data survives pod deletion (this is "persistent storage handling").
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db
  namespace: learningdemo
spec:
  serviceName: db          # must match the headless Service name above
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          # Pull POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB from the Secret.
          envFrom:
            - secretRef:
                name: db-secret
          env:
            # Store data in a subdirectory, NOT the volume root. The mount root
            # can contain a "lost+found" dir which makes Postgres initdb refuse
            # to start. A classic gotcha worth mentioning on camera.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          # readiness = "can it accept queries yet?"  pg_isready answers exactly
          # that. The app's startupProbe waits on this indirectly.
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "learningdemo"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "learningdemo"]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      volumes:
        - name: init
          configMap:
            name: db-init
  # One PVC per replica. kind ships a default StorageClass (rancher local-path)
  # so this is provisioned automatically — no manual PV needed.
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi

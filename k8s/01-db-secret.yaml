# Secret: holds the database credentials.
# - In K8s, Secrets are the right place for passwords (separate from config).
# - stringData lets you write plain text; K8s base64-encodes it for you.
# - SECURITY NOTE for the video: committing a Secret to git is NOT production
#   practice. In real life you'd use Sealed Secrets, SOPS, External Secrets,
#   or a vault. This is simplified on purpose (mention this in tradeoffs).
#
# Both the Postgres pod and the app pod read from this one Secret, so the
# credentials are defined in exactly one place.
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: learningdemo
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: learningdemo

apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "learningdemo.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.credentials.postgresUser | quote }}
  POSTGRES_PASSWORD: {{ .Values.credentials.postgresPassword | quote }}
  POSTGRES_DB: {{ .Values.credentials.postgresDb | quote }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: db-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "learningdemo.labels" . | nindent 4 }}
data:
  # Mounted into /docker-entrypoint-initdb.d/ inside the Postgres container.
  # The official postgres image runs every .sql file there automatically
  # the first time it starts on an empty data volume.
  init.sql: |
    CREATE TABLE IF NOT EXISTS users (
      id          SERIAL PRIMARY KEY,
      username    VARCHAR(50)  NOT NULL UNIQUE,
      email       VARCHAR(255) NOT NULL UNIQUE,
      password    VARCHAR(255) NOT NULL,
      created_at  TIMESTAMP    NOT NULL DEFAULT NOW()
    );

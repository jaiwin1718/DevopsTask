# ── Headless Service ──────────────────────────────────────────────────────────
# clusterIP: None = headless. DNS returns the pod IP directly.
# Name "db" becomes the hostname the app uses: DB_HOST=db
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "learningdemo.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    app: db
  ports:
    - port: 5432
      targetPort: 5432
---
# ── StatefulSet ───────────────────────────────────────────────────────────────
# WHY StatefulSet: Postgres needs a stable name (db-0) and persistent storage
# that reattaches across pod restarts. A Deployment gives neither.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "learningdemo.labels" . | nindent 4 }}
spec:
  serviceName: db
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.db.image.repository }}:{{ .Values.db.image.tag }}"
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: db-secret
          env:
            # PGDATA must be a subdirectory, not the volume root itself.
            # The volume root can contain a lost+found dir which makes
            # Postgres refuse to initialise. A very common gotcha.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "learningdemo"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "learningdemo"]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.db.resources | nindent 12 }}
      volumes:
        - name: init
          configMap:
            name: db-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.db.storage }}
